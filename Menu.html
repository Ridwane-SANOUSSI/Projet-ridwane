<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <base target="ecran">
    <style>
        body {
            background-color: #f8f9fa; /* Fond gris très clair moderne */
            padding: 15px;
            font-family: Arial, sans-serif;
        }
        
        .menu-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
            border-bottom: 2px solid #ccc;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        /* Style chic pour les boutons du menu */
        .nav-link-custom {
            display: block;
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 8px;
            color: #007bff; /* Couleur bleue propre */
            text-decoration: none;
            background-color: #fff;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
        }

        /* Effet au survol (souris ou doigt) */
        .nav-link-custom:hover {
            background-color: #007bff;
            color: #fff !important;
            transform: translateX(3px); /* Petit décalage élégant sur PC */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* 📱 Ajustements pour les écrans de téléphones */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .menu-title {
                text-center: center;
                font-size: 1rem;
                margin-bottom: 10px;
            }
            /* Sur mobile, les liens se mettent en grille fluide les uns à côté des autres */
            .menu-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr); /* 2 colonnes de boutons sur mobile */
                gap: 8px;
            }
            .nav-link-custom {
                margin-bottom: 0;
                text-align: center;
                font-size: 0.9rem;
                padding: 8px;
            }
            .nav-link-custom:hover {
                transform: none; /* Désactive le décalage horizontal sur mobile */
            }
        }
    </style>
</head>
<body>

    <div class="menu-title text-center text-md-start">MENU</div>

    <div class="menu-container">
        <a href="Ridwane html/Page1.html" class="nav-link-custom">Page 1</a>
        <a href="Ridwane html/Tp1.html" class="nav-link-custom">TP 1</a>
        <a href="Ridwane html/Tp2.html" class="nav-link-custom">TP 2</a>
        <a href="Ridwane html/Tp_liste.html" class="nav-link-custom">Listes</a>
        <a href="Tableau/Table.html" class="nav-link-custom">Tableau</a>
        <a href="Tableau/TP_tableau.html" class="nav-link-custom">TP Tableau</a>
        <a href="Ridwane html/Ridwane html/TP_formulaire.html" class="nav-link-custom">Formulaires</a>
        <a href="Cv ridwane/cv.html" class="nav-link-custom">Mon CV</a>
    </div>

</body>
</html>
