<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <base target="ecran">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            /* 🎨 Fond bleu nuit super pro et moderne */
            background-color: #1e293b; 
            padding: 15px 10px;
            font-family: Arial, sans-serif;
        }
        
        .menu-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #f8fafc; /* Texte blanc cassé propre */
            letter-spacing: 1.5px;
            border-bottom: 1px solid #334155; /* Ligne de séparation discrète */
            padding-bottom: 8px;
            margin-bottom: 20px;
        }

        /* Conteneur global : alignement vertical STRICT sur tous les écrans */
        .menu-container {
            display: flex;
            flex-direction: column; /* Force l'alignement vertical du haut vers le bas */
            gap: 10px; /* Espace entre les boutons */
        }

        /* Style des boutons chics sur fond sombre */
        .nav-link-custom {
            display: block;
            width: 100%; /* Prend toute la largeur disponible à gauche */
            padding: 12px 10px;
            color: #f8fafc; /* Texte blanc */
            text-decoration: none;
            background-color: #334155; /* Boutons gris-bleu qui s'intègrent au fond */
            border: 1px solid #475569;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            text-align: center;
            white-space: normal; /* Permet au texte de revenir à la ligne si le bouton est étroit */
            word-wrap: break-word;
            transition: all 0.2s ease-in-out;
        }

        /* Effet au survol (au doigt ou à la souris) */
        .nav-link-custom:hover {
            background-color: #3b82f6; /* Devient bleu vif au survol */
            color: #ffffff !important;
            border-color: #3b82f6;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>

    <div class="menu-title text-center">MENU</div>

    <div class="menu-container">
        <a href="Ridwane html/Page1.html" class="nav-link-custom">Page 1</a>
        <a href="Ridwane html/Tp1.html" class="nav-link-custom">TP 1</a>
        <a href="Ridwane html/Tp2.html" class="nav-link-custom">TP 2</a>
        <a href="Ridwane html/Tp_liste.html" class="nav-link-custom">Listes</a>
        <a href="Tableau/Table.html" class="nav-link-custom">Tableau</a>
        <a href="Tableau/TP_tableau.html" class="nav-link-custom">TP Tableau</a>
        <a href="Ridwane html/Ridwane html/TP_formulaire.html" class="nav-link-custom">Formulaires</a>
        <a href="Cv ridwane/cv.html" class="nav-link-custom">Mon CV</a>
    </div>

</body>
</html>
