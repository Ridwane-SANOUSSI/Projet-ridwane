<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: aliceblue;
            margin: 0;
            padding: 0;
        }
        
        /* En-tête modernisé avec ta couleur aqua */
        header {
            width: 100%;
            background-color: aqua;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Petit effet d'ombre élégant */
        }

        /* Ajustement fluide des logos pour le mobile */
        .logo-img {
            max-width: 50px;
            height: auto;
            border-radius: 5px; /* Optionnel : adoucit les angles des logos */
        }

        /* Style responsive pour le grand titre */
        .header-title {
            font-weight: 700;
            color: #000;
            margin: 0;
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 1.1rem !important; /* Réduit proprement la taille sur mobile */
            }
            .logo-img {
                max-width: 40px; /* Adapte légèrement la taille des logos sur téléphone */
            }
        }
    </style>
</head>
<body>

     <header>
         <div class="container-fluid">
             <div class="row align-items-center justify-content-between text-center px-3">
                 
                 <div class="col-2 col-md-2 text-start">
                    <a href="https://etudiant.uac.bj" target="_blank">
                        <img src="Ridwane html/logouac.jpg" alt="logouac" class="logo-img" width="50" height="50"/>
                    </a>
                 </div>    
                 
                 <div class="col-8 col-md-8">
                    <h1 class="header-title h4">Bienvenue dans mon site web !<br><small class="text-muted fs-5">Ridwane SANOUSSI</small></h1>
                 </div>
                 
                 <div class="col-2 col-md-2 text-end">
                    <img src="Ridwane html/logoenam.jpg" alt="logo eneam" class="logo-img" width="50" height="50"/> 
                 </div>
                 
             </div>
         </div>
     </header>

</body>
</html>
