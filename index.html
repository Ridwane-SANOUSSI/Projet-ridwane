<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefolio - SANOUSSI Ridwane Koladé Adissa Josué</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Configuration pour grand écran (Style ordinateur de bureau) */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .header-zone {
            height: 18vh;
            width: 100%;
        }
        .middle-zone {
            display: flex;
            height: 63vh;
            width: 100%;
        }
        .menu-frame {
            width: 20%;
            height: 100%;
            border-right: 2px solid #ccc;
        }
        .content-frame {
            width: 80%;
            height: 100%;
        }
        .footer-zone {
            height: 19vh;
            width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 📱 MODE RESPONSIVE : Configuration magique pour Téléphone */
        @media (max-width: 768px) {
            html, body {
                overflow: auto; /* Autorise le défilement vertical sur mobile */
                height: auto;
            }
            .main-container {
                height: auto;
            }
            /* Sur mobile, tout s'empile verticalement et prend sa vraie taille */
            .header-zone {
                height: auto;
                min-height: 120px;
            }
            .middle-zone {
                flex-direction: column;
                height: auto;
            }
            .menu-frame {
                width: 100%;
                height: auto;
                min-height: 180px;
                border-right: none;
                border-bottom: 2px solid #ccc;
            }
            .content-frame {
                width: 100%;
                height: 70vh; /* Donne une belle hauteur de lecture pour ton CV/tableaux sur mobile */
            }
            .footer-zone {
                height: auto;
                min-height: 100px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-zone">
            <iframe name="head" id="head" src="head.html"></iframe>
        </div>

        <div class="middle-zone">
            <div class="menu-frame">
                <iframe name="Menu" id="Menu" src="Menu.html"></iframe>
            </div>
            <div class="content-frame">
                <iframe name="ecran" id="ecran" src="Ridwane html/Page1.html"></iframe>
            </div>
        </div>

        <div class="footer-zone">
            <iframe name="footer" id="footer" src="footer.html"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
