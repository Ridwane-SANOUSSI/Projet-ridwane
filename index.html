<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefolio - SANOUSSI Ridwane Koladé Adissa Josué</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #f8f9fa;
        }
        .main-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        .header-zone { 
            height: 18vh; 
            width: 100%; 
        }
        /* Zone du milieu forcée en ligne (côte à côte) sur TOUS les écrans */
        .middle-zone { 
            display: flex; 
            flex-direction: row !important; /* Empeche l'empilement sur mobile */
            height: 63vh; 
            width: 100%; 
        }
        /* Menu strictement bloqué à gauche à 25% de la largeur */
        .menu-frame { 
            width: 25%; 
            height: 100%; 
            border-right: 2px solid #ccc; 
        }
        /* Pages du menu strictement bloquées à droite à 75% de la largeur */
        .content-frame { 
            width: 75%; 
            height: 100%; 
        }
        .footer-zone { 
            height: 19vh; 
            width: 100%; 
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }

        /* Ajustement léger pour les petits écrans sans casser la structure du prof */
        @media (max-width: 768px) {
            .header-zone { height: 15vh; }
            .middle-zone { height: 70vh; }
            .footer-zone { height: 15vh; }
            .menu-frame { width: 30%; } /* Un tout petit peu plus large sur mobile pour les boutons */
            .content-frame { width: 70%; }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-zone">
            <iframe name="head" id="head" src="head.html"></iframe>
        </div>
        
        <div class="middle-zone">
            <div class="menu-frame">
                <iframe name="Menu" id="Menu" src="Menu.html"></iframe>
            </div>
            <div class="content-frame">
                <iframe name="ecran" id="ecran" src="Ridwane html/Page1.html"></iframe>
            </div>
        </div>
        
        <div class="footer-zone">
            <iframe name="footer" id="footer" src="footer.html"></iframe>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
