<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portefolio - SANOUSSI Ridwane Koladé Adissa Josué</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            background-color: #f8f9fa;
        }

        body {
            overflow-y: hidden; 
        }

        .main-container { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        .header-zone { 
            height: 18vh; 
            width: 100%; 
        }
        .middle-zone { 
            display: flex; 
            flex-direction: row !important; 
            height: 63vh; 
            width: 100%; 
        }
        .menu-frame { 
            width: 25%; 
            height: 100%; 
            border-right: 2px solid #ccc; 
        }
        .content-frame { 
            width: 75%; 
            height: 100%; 
        }
        
        /* 🎨 Modification ici : Ajout de l'arrière-plan professionnel pour ton footer */
        .footer-zone { 
            height: 19vh; 
            width: 100%; 
            background-color: #e2e8f0; /* Bleu-gris sobre qui se marie parfaitement avec ton beige et ton menu */
            padding: 4px 0; /* Donne une petite respiration élégante autour de l'iframe */
        }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
            background-color: transparent; /* Permet de laisser voir le fond si nécessaire */
        }

        @media (max-width: 768px) {
            .header-zone { height: 15vh; }
            .middle-zone { height: 70vh; }
            .footer-zone { height: 15vh; }
            .menu-frame { width: 30%; } 
            .content-frame { width: 70%; }
        }

        @media (max-height: 500px) {
            body {
                overflow-y: auto !important; 
            }
            .main-container {
                height: auto !important; 
            }
            .header-zone { 
                height: 80px !important; 
            }
            .middle-zone { 
                height: 400px !important; 
            }
            .footer-zone { 
                height: 80px !important; 
                background-color: #e2e8f0; /* Reste actif en mode paysage */
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header-zone">
            <iframe name="head" id="head" src="head.html"></iframe>
        </div>
        
        <div class="middle-zone">
            <div class="menu-frame">
                <iframe name="Menu" id="Menu" src="Menu.html"></iframe>
            </div>
            <div class="content-frame">
                <iframe name="ecran" id="ecran" src="Ridwane html/Page1.html"></iframe>
            </div>
        </div>
        
        <div class="footer-zone">
            <iframe name="footer" id="footer" src="footer.html"></iframe>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
