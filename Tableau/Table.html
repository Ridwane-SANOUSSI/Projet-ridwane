<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau ENEAM</title>
    <link rel="stylesheet" href="Table.css">
    
    <style>
        /* 📱 Rendre le tableau responsive et l'empêcher de déborder sur téléphone */
        .tableau-eneam {
            width: 100% !important;
            max-width: 100% !important;
            table-layout: fixed; /* Force le navigateur à respecter les dimensions configurées */
        }

        /* 📏 Rectification : On donne exactement la même dimension (50% de l'espace restant chacune) à B et C */
        .case-b, .case-c {
            width: 50% !important;
        }

        /* 🔵 Seule modification autorisée : ENEAM passe en bleu */
        .case-eneam {
            color: blue !important;
        }
    </style>
</head>
<body>

    <table class="tableau-eneam">
        <tr>
            <td colspan="3" class="case-eneam">ENE<span class="couleur">A</span>M</td>
        </tr>
        
        <tr>
            <td rowspan="2" class="case-ig">
                <span class="text-oblique">IG1 - B</span>
            </td>
            <td colspan="2" class="case-a">A</td>
        </tr>
        <tr>
            <td class="case-b">B</td>
            <td  class="case-c">C</td>
        </tr>
        
        <tr>
            <td  class="case-epac">
                <span class="texte-oblique">EPAC</span>
            </td>
            <td colspan="2" class="case-prog">
                <span class="oblique">Programmation</span>
            </td>
        </tr>
    </table>

</body>
</html>
