<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau ENEAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Table.css">
</head>
<body>

    <div class="container-fluid py-4">
        <div class="table-responsive">
            
            <table class="tableau-eneam">
                <tr>
                    <td colspan="3" class="case-eneam" style="color: blue !important;">ENE<span class="couleur">A</span>M</td>
                </tr>
                
                <tr>
                    <td rowspan="2" class="case-ig" style="font-size: 1.4rem !important; padding: 10px !important;">
                        <span class="text-oblique">IG1 - B</span>
                    </td>
                    <td colspan="2" class="case-a">A</td>
                </tr>
                <tr>
                    <td class="case-b">B</td>
                    <td class="case-c">C</td>
                </tr>
                
                <tr>
                    <td class="case-epac">
                        <span class="texte-oblique">EPAC</span>
                    </td>
                    <td colspan="2" class="case-prog">
                        <span class="oblique">Programmation</span>
                    </td>
                </tr>
            </table>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
