<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau ENEAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            padding: 40px 15px;
            font-family: Arial, sans-serif;
        }

        /* Centrage du tableau sur la page */
        .table-container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Tableau avec bordures visibles et centrées */
        .tableau-eneam {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            background-color: #ffffff;
            table-layout: fixed; /* Permet de forcer le respect des largeurs de colonnes */
        }

        .tableau-eneam td {
            border: 2px solid #334155;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 📏 Rectification : On donne exactement la même largeur à B et C */
        .case-b, .case-c {
            width: 50%;
        }

        /* 🔵 Application de la couleur bleue sur les textes spécifiques */
        .case-eneam, .couleur {
            color: #0284c7 !important;
        }

        /* Conservation de tes styles de texte oblique */
        .text-oblique, .texte-oblique, .oblique {
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="container table-container">
        <div class="table-responsive">
            
            <table class="tableau-eneam">
                <tr>
                    <td colspan="3" class="case-eneam">ENE<span class="couleur">A</span>M</td>
                </tr>
                
                <tr>
                    <td rowspan="2" class="case-ig">
                        <span class="text-oblique">IG1 - B</span>
                    </td>
                    <td colspan="2" class="case-a">A</td>
                </tr>
                <tr>
                    <td class="case-b">B</td>
                    <td class="case-c">C</td>
                </tr>
                
                <tr>
                    <td class="case-epac">
                        <span class="texte-oblique">EPAC</span>
                    </td>
                    <td colspan="2" class="case-prog">
                        <span class="oblique">Programmation</span>
                    </td>
                </tr>
            </table>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
